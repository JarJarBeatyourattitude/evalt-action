name: Evalt performance gate
description: Find or verify the lowest-cost AI route that clears your frozen quality contract.
author: Jonathan Larson

branding:
  icon: activity
  color: purple

inputs:
  suite:
    description: Path to the versioned Evalt suite.
    required: false
    default: evalt.json
  result:
    description: Path where the machine-readable Evalt result is written or read.
    required: false
    default: evalt-result.json
  optimize:
    description: Run the budget-capped tournament before applying the gate. Set false to gate an existing result without provider calls.
    required: false
    default: "true"
  evalt-version:
    description: Exact PyPI version to install. Mutable aliases such as latest are rejected.
    required: false
    default: 0.9.0
  python-version:
    description: Python version used by the action.
    required: false
    default: "3.12"
  min-pass-rate:
    description: Required final-test pass rate from 0 through 1.
    required: false
    default: "0.95"
  max-cost-per-success:
    description: Optional maximum USD cost per successful production call.
    required: false
    default: ""
  require-complete-coverage:
    description: Fail when the tournament did not finish all decision-relevant coverage.
    required: false
    default: "true"
  fixed-prompt:
    description: Disable prompt rewrites and few-shot search while still comparing model routes.
    required: false
    default: "false"
  max-parallel-models:
    description: Optional override for parallel model lanes.
    required: false
    default: ""
  max-parallel-scenarios:
    description: Optional override for parallel scenario executions per model.
    required: false
    default: ""
  request-timeout-seconds:
    description: Optional wall-clock deadline for one provider response, not the tournament.
    required: false
    default: ""
  html-report:
    description: Path for the self-contained HTML evidence report.
    required: false
    default: evalt-report.html
  junit-report:
    description: Path for the case-level JUnit report.
    required: false
    default: evalt-junit.xml

outputs:
  status:
    description: PASS, FAIL, or ERROR.
    value: ${{ steps.run.outputs.status }}
  selected-model:
    description: Model selected in the saved result, if one qualified.
    value: ${{ steps.run.outputs.selected-model }}
  final-test-pass-rate:
    description: Measured final-test pass rate.
    value: ${{ steps.run.outputs.final-test-pass-rate }}
  cost-per-1000-successful-calls-usd:
    description: Measured production cost per 1,000 successful calls.
    value: ${{ steps.run.outputs.cost-per-1000-successful-calls-usd }}
  result:
    description: Path to the machine-readable result.
    value: ${{ steps.run.outputs.result }}
  html-report:
    description: Path to the self-contained HTML report.
    value: ${{ steps.run.outputs.html-report }}
  junit-report:
    description: Path to the case-level JUnit report.
    value: ${{ steps.run.outputs.junit-report }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: ${{ inputs.python-version }}
    - name: Run Evalt
      id: run
      shell: bash
      env:
        EVALT_ACTION_SUITE: ${{ inputs.suite }}
        EVALT_ACTION_RESULT: ${{ inputs.result }}
        EVALT_ACTION_OPTIMIZE: ${{ inputs.optimize }}
        EVALT_ACTION_VERSION: ${{ inputs.evalt-version }}
        EVALT_ACTION_MIN_PASS_RATE: ${{ inputs.min-pass-rate }}
        EVALT_ACTION_MAX_COST_PER_SUCCESS: ${{ inputs.max-cost-per-success }}
        EVALT_ACTION_REQUIRE_COMPLETE_COVERAGE: ${{ inputs.require-complete-coverage }}
        EVALT_ACTION_FIXED_PROMPT: ${{ inputs.fixed-prompt }}
        EVALT_ACTION_MAX_PARALLEL_MODELS: ${{ inputs.max-parallel-models }}
        EVALT_ACTION_MAX_PARALLEL_SCENARIOS: ${{ inputs.max-parallel-scenarios }}
        EVALT_ACTION_REQUEST_TIMEOUT_SECONDS: ${{ inputs.request-timeout-seconds }}
        EVALT_ACTION_HTML_REPORT: ${{ inputs.html-report }}
        EVALT_ACTION_JUNIT_REPORT: ${{ inputs.junit-report }}
      run: python "$GITHUB_ACTION_PATH/run_action.py"
