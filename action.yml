name: Evalt performance gate
description: Find or verify the lowest-cost AI route that clears your frozen quality contract.
author: Jonathan Larson

branding:
  icon: activity
  color: purple

inputs:
  suite:
    description: Path to the versioned Evalt suite.
    required: false
    default: evalt.json
  result:
    description: Path where the machine-readable Evalt result is written or read.
    required: false
    default: evalt-result.json
  baseline:
    description: Optional earlier result from the identical frozen suite. Enables fail-closed regression gating without provider calls.
    required: false
    default: ""
  library-root:
    description: Optional private local evidence-library directory used by @name suite or baseline references.
    required: false
    default: ""
  optimize:
    description: Run the budget-capped tournament before applying the gate. Set false to gate an existing result without provider calls.
    required: false
    default: "true"
  evalt-version:
    description: Exact PyPI version to install. Mutable aliases such as latest are rejected.
    required: false
    default: 0.10.31
  python-version:
    description: Python version used by the action.
    required: false
    default: "3.12"
  min-pass-rate:
    description: Required final-test pass rate from 0 through 1.
    required: false
    default: "0.95"
  max-cost-per-success:
    description: Optional maximum USD cost per successful production call.
    required: false
    default: ""
  require-complete-coverage:
    description: Fail when the tournament did not finish all decision-relevant coverage.
    required: false
    default: "true"
  max-regressions:
    description: Maximum previously passing frozen cases allowed to fail when baseline is set.
    required: false
    default: "0"
  max-quality-drop-pp:
    description: Maximum aggregate final-test quality drop in percentage points when baseline is set.
    required: false
    default: "0"
  max-cost-increase-pct:
    description: Optional maximum production cost increase versus baseline, in percent.
    required: false
    default: ""
  max-p90-increase-ms:
    description: Optional maximum p90 latency increase versus baseline, in milliseconds.
    required: false
    default: ""
  fixed-prompt:
    description: Disable prompt rewrites and few-shot search while still comparing model routes.
    required: false
    default: "false"
  max-parallel-models:
    description: Optional override for parallel model lanes.
    required: false
    default: ""
  max-parallel-scenarios:
    description: Optional override for parallel scenario executions per model.
    required: false
    default: ""
  request-timeout-seconds:
    description: Optional wall-clock deadline for one provider response, not the tournament.
    required: false
    default: ""
  custom-scorer-id:
    description: Optional trusted local scorer ID. The suite cannot select executable code.
    required: false
    default: ""
  custom-scorer-version:
    description: Version of the trusted local scorer registered for this run.
    required: false
    default: ""
  custom-scorer-executable:
    description: Executable for the trusted repository-local scorer; launched directly without a shell.
    required: false
    default: ""
  custom-scorer-arguments-json:
    description: JSON array of literal argv items passed to the scorer executable.
    required: false
    default: "[]"
  custom-scorer-timeout-seconds:
    description: Per-case local scorer timeout in seconds.
    required: false
    default: "10"
  custom-scorer-max-input-bytes:
    description: Maximum serialized scorer request size per case.
    required: false
    default: "8388608"
  custom-scorer-max-output-bytes:
    description: Maximum scorer stdout or stderr size per case.
    required: false
    default: "65536"
  html-report:
    description: Path for the self-contained HTML evidence report.
    required: false
    default: evalt-report.html
  junit-report:
    description: Path for the case-level JUnit report.
    required: false
    default: evalt-junit.xml

outputs:
  status:
    description: PASS, FAIL, or ERROR.
    value: ${{ steps.run.outputs.status }}
  selected-model:
    description: Model selected in the saved result, if one qualified.
    value: ${{ steps.run.outputs.selected-model }}
  route-version:
    description: Qualified route package ID when the result contains one; otherwise empty.
    value: ${{ steps.run.outputs.route-version }}
  final-test-pass-rate:
    description: Measured final-test pass rate.
    value: ${{ steps.run.outputs.final-test-pass-rate }}
  case-regressions:
    description: Count of previously passing frozen cases that failed, when a baseline was set.
    value: ${{ steps.run.outputs.case-regressions }}
  quality-delta-pp:
    description: Candidate quality change versus baseline in percentage points.
    value: ${{ steps.run.outputs.quality-delta-pp }}
  cost-per-1000-successful-calls-usd:
    description: Measured production cost per 1,000 successful calls.
    value: ${{ steps.run.outputs.cost-per-1000-successful-calls-usd }}
  result:
    description: Path to the machine-readable result.
    value: ${{ steps.run.outputs.result }}
  html-report:
    description: Path to the self-contained HTML report.
    value: ${{ steps.run.outputs.html-report }}
  junit-report:
    description: Path to the case-level JUnit report.
    value: ${{ steps.run.outputs.junit-report }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: ${{ inputs.python-version }}
    - name: Run Evalt
      id: run
      shell: bash
      env:
        EVALT_ACTION_SUITE: ${{ inputs.suite }}
        EVALT_ACTION_RESULT: ${{ inputs.result }}
        EVALT_ACTION_BASELINE: ${{ inputs.baseline }}
        EVALT_ACTION_LIBRARY_ROOT: ${{ inputs.library-root }}
        EVALT_ACTION_OPTIMIZE: ${{ inputs.optimize }}
        EVALT_ACTION_VERSION: ${{ inputs.evalt-version }}
        EVALT_ACTION_MIN_PASS_RATE: ${{ inputs.min-pass-rate }}
        EVALT_ACTION_MAX_COST_PER_SUCCESS: ${{ inputs.max-cost-per-success }}
        EVALT_ACTION_REQUIRE_COMPLETE_COVERAGE: ${{ inputs.require-complete-coverage }}
        EVALT_ACTION_MAX_REGRESSIONS: ${{ inputs.max-regressions }}
        EVALT_ACTION_MAX_QUALITY_DROP_PP: ${{ inputs.max-quality-drop-pp }}
        EVALT_ACTION_MAX_COST_INCREASE_PCT: ${{ inputs.max-cost-increase-pct }}
        EVALT_ACTION_MAX_P90_INCREASE_MS: ${{ inputs.max-p90-increase-ms }}
        EVALT_ACTION_FIXED_PROMPT: ${{ inputs.fixed-prompt }}
        EVALT_ACTION_MAX_PARALLEL_MODELS: ${{ inputs.max-parallel-models }}
        EVALT_ACTION_MAX_PARALLEL_SCENARIOS: ${{ inputs.max-parallel-scenarios }}
        EVALT_ACTION_REQUEST_TIMEOUT_SECONDS: ${{ inputs.request-timeout-seconds }}
        EVALT_ACTION_CUSTOM_SCORER_ID: ${{ inputs.custom-scorer-id }}
        EVALT_ACTION_CUSTOM_SCORER_VERSION: ${{ inputs.custom-scorer-version }}
        EVALT_ACTION_CUSTOM_SCORER_EXECUTABLE: ${{ inputs.custom-scorer-executable }}
        EVALT_ACTION_CUSTOM_SCORER_ARGUMENTS_JSON: ${{ inputs.custom-scorer-arguments-json }}
        EVALT_ACTION_CUSTOM_SCORER_TIMEOUT_SECONDS: ${{ inputs.custom-scorer-timeout-seconds }}
        EVALT_ACTION_CUSTOM_SCORER_MAX_INPUT_BYTES: ${{ inputs.custom-scorer-max-input-bytes }}
        EVALT_ACTION_CUSTOM_SCORER_MAX_OUTPUT_BYTES: ${{ inputs.custom-scorer-max-output-bytes }}
        EVALT_ACTION_HTML_REPORT: ${{ inputs.html-report }}
        EVALT_ACTION_JUNIT_REPORT: ${{ inputs.junit-report }}
      run: python "$GITHUB_ACTION_PATH/run_action.py"
